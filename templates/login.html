<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş – Home Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1117; }
    .card { background: #1a1d27; border: 1px solid #2a2d3e; }
    .input { background: #0f1117; border: 1px solid #2a2d3e; color: #e2e8f0; width: 100%; padding: .6rem .9rem; border-radius: .5rem; font-size: .9rem; }
    .input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,.2); }
  </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold text-lg">H</div>
      <span class="text-xl font-semibold text-slate-100">Home Control</span>
    </div>

    <div class="card rounded-2xl p-8">
      <h1 class="text-lg font-semibold mb-6 text-slate-100">Giriş Yap</h1>

      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="flex flex-col gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Kullanıcı Adı</label>
          <input name="username" type="text" class="input" placeholder="admin" autocomplete="username" required />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Şifre</label>
          <input name="password" type="password" class="input" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="mt-2 w-full py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm transition-colors">
          Giriş Yap
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-slate-600 mt-6">Home Control Server v1.0</p>
  </div>
</body>
</html>
