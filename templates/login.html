<!doctype html>
<html lang="tr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş – Home Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: #0f1117;
      }
      .card {
        background: #1a1d27;
        border: 1px solid #2a2d3e;
      }
      .input {
        background: #0f1117;
        border: 1px solid #2a2d3e;
        color: #e2e8f0;
        width: 100%;
        padding: 0.6rem 0.9rem;
        border-radius: 0.5rem;
        font-size: 0.9rem;
      }
      .input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
      }
    </style>
  </head>
  <body class="text-slate-200 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
      <div class="flex items-center justify-center gap-3 mb-8">
        <div
          class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold text-lg"
        >
          H
        </div>
        <span class="text-xl font-semibold text-slate-100">Home Control</span>
      </div>

      <div class="card rounded-2xl p-8">
        <h1 class="text-lg font-semibold mb-6 text-slate-100">Giriş Yap</h1>

        {% if error %}
        <div
          class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"
        >
          {{ error }}
        </div>
        {% endif %}

        <button
          id="passkeyLoginBtn"
          type="button"
          {%
          if
          not
          has_passkeys
          %}disabled{%
          endif
          %}
          class="w-full py-2.5 rounded-lg bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium text-sm transition-colors"
        >
          Passkey ile Giriş Yap
        </button>
        <p id="passkeyHelp" class="text-xs text-slate-500 mt-2 mb-5">
          {% if has_passkeys %} Tarayıcıdaki kayıtlı passkey ile hızlı giriş
          yapabilirsin. {% else %} Henüz kayıtlı passkey yok. İlk kurulum için
          alttaki şifreli girişi kullan. {% endif %}
        </p>

        <form
          method="post"
          action="/login"
          class="flex flex-col gap-4 border-t border-white/5 pt-5"
        >
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5"
              >Kullanıcı Adı</label
            >
            <input
              name="username"
              type="text"
              class="input"
              placeholder="admin"
              autocomplete="username"
              required
            />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5"
              >Şifre</label
            >
            <input
              name="password"
              type="password"
              class="input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>
          <button
            type="submit"
            class="mt-2 w-full py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm transition-colors"
          >
            Şifre ile Giriş Yap
          </button>
        </form>
      </div>
      <p class="text-center text-xs text-slate-600 mt-6">
        Home Control Server v1.0
      </p>
    </div>

    <script>
      function base64urlToUint8Array(base64url) {
        const padding = "=".repeat((4 - (base64url.length % 4)) % 4);
        const base64 = (base64url + padding)
          .replace(/-/g, "+")
          .replace(/_/g, "/");
        const raw = atob(base64);
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i += 1) bytes[i] = raw.charCodeAt(i);
        return bytes;
      }

      function uint8ArrayToBase64url(bytes) {
        let str = "";
        bytes.forEach((byte) => {
          str += String.fromCharCode(byte);
        });
        return btoa(str)
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }

      async function loginWithPasskey() {
        const help = document.getElementById("passkeyHelp");
        try {
          const beginResp = await fetch("/auth/passkey/login/begin", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
          });
          const options = await beginResp.json();
          if (!beginResp.ok) {
            throw new Error(
              options.error || "Passkey challenge olusturulamadi.",
            );
          }

          options.challenge = base64urlToUint8Array(options.challenge);
          if (Array.isArray(options.allowCredentials)) {
            options.allowCredentials = options.allowCredentials.map((cred) => ({
              ...cred,
              id: base64urlToUint8Array(cred.id),
            }));
          }

          const credential = await navigator.credentials.get({
            publicKey: options,
          });
          if (!credential) {
            throw new Error("Passkey secimi iptal edildi.");
          }

          const assertionResponse = credential.response;
          const finishPayload = {
            id: credential.id,
            rawId: uint8ArrayToBase64url(new Uint8Array(credential.rawId)),
            type: credential.type,
            response: {
              authenticatorData: uint8ArrayToBase64url(
                new Uint8Array(assertionResponse.authenticatorData),
              ),
              clientDataJSON: uint8ArrayToBase64url(
                new Uint8Array(assertionResponse.clientDataJSON),
              ),
              signature: uint8ArrayToBase64url(
                new Uint8Array(assertionResponse.signature),
              ),
              userHandle: assertionResponse.userHandle
                ? uint8ArrayToBase64url(
                    new Uint8Array(assertionResponse.userHandle),
                  )
                : null,
            },
            clientExtensionResults: credential.getClientExtensionResults(),
          };

          const finishResp = await fetch("/auth/passkey/login/finish", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(finishPayload),
          });
          const finishData = await finishResp.json();
          if (!finishResp.ok || !finishData.ok) {
            throw new Error(finishData.error || "Passkey ile giris basarisiz.");
          }

          window.location.href = finishData.redirect || "/";
        } catch (error) {
          help.textContent = error.message || "Passkey girisi basarisiz oldu.";
          help.className = "text-xs text-red-400 mt-2 mb-5";
        }
      }

      const passkeyLoginBtn = document.getElementById("passkeyLoginBtn");
      if (
        window.PublicKeyCredential &&
        passkeyLoginBtn &&
        !passkeyLoginBtn.disabled
      ) {
        passkeyLoginBtn.addEventListener("click", loginWithPasskey);
      }
    </script>
  </body>
</html>
