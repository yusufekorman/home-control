<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baglanti Yok - Home Control</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2937 0%, #0f1117 55%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e2e8f0;
        padding: 24px;
        box-sizing: border-box;
      }

      .card {
        width: min(460px, 100%);
        background: rgba(26, 29, 39, 0.85);
        border: 1px solid #2a2d3e;
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(6px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Baglanti su anda yok</h1>
      <p>
        Internet tekrar geldiginde sayfayi yenileyin. Onbellekteki statik
        dosyalar kullanilmaya devam eder.
      </p>
    </main>
  </body>
</html>
